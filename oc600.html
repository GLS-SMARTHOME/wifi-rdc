<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    body { 
      font-family: sans-serif; 
      padding: 20px; 
      background-color: #f0f2f5;
      margin: 0;
    }
    ul { list-style: none; padding: 0; margin: 0; }
    li { 
      background: white;
      padding: 40px; 
      margin-bottom: 15px;
      border-radius: 20px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
      cursor: pointer; 
      font-size: 36px; 
      font-weight: bold;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border: 4px solid transparent;
      transition: 0.2s;
    }
    li:hover { border-color: #ff5252; background: #fff8f8; }
    .deleting { opacity: 0.4; pointer-events: none; background: #eee !important; }
  </style>
</head>
<body>

<ul id="deviceList"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com";

  const firebaseConfig = {
    apiKey: "AIzaSyAIlkvwyaF6FPPbXBJDqHwuTS5S3QKG3l8",
    authDomain: "xoxo-store.firebaseapp.com",
    databaseURL: "https://xoxo-store-default-rtdb.firebaseio.com",
    projectId: "xoxo-store",
    storageBucket: "xoxo-store.firebasestorage.app",
    messagingSenderId: "667290233046",
    appId: "1:667290233046:web:dbbc9130ff38b0900f8177"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const devicesRef = ref(db, "devices");

  onValue(devicesRef, (snapshot) => {
    const list = document.getElementById("deviceList");
    list.innerHTML = "";

    if (!snapshot.exists()) {
      list.innerHTML = "<li style='border:none; background:none; justify-content:center;'>No Devices Found</li>";
      return;
    }

    snapshot.forEach((childSnapshot) => {
      const key = childSnapshot.key; // 🚀 This is your number (456789, etc.)

      const li = document.createElement("li");
      // Display the Key directly since your values are empty
      li.innerHTML = `<span>ID: ${key}</span> <span style="font-size:45px;">🗑️</span>`;

      li.onclick = async () => {
        if (!confirm(`Delete ID: ${key}?`)) return;

        li.classList.add("deleting");
        li.innerHTML = "<span>⌛ Removing...</span>";

        try {
          // Standard [Firebase remove](https://firebase.google.com)
          await remove(ref(db, `devices/${key}`));
        } catch (error) {
          alert("Error: " + error.message);
          location.reload(); 
        }
      };
      list.appendChild(li);
    });
  });
</script>

</body>
</html>
