<!DOCTYPE html>
<html>
<head>
  <title>Wi-Fi Access Page</title>
  <style>
    body { font-family: Arial, sans-serif; padding: 20px; }
    #accessSection, #deviceSection { max-width: 400px; margin: auto; }
    input { width: 100%; padding: 10px; margin: 10px 0; font-size: 16px; }
    button { padding: 10px 20px; font-size: 16px; cursor: pointer; }
    ul { padding: 0; }
    li { list-style: none; padding: 10px; margin: 6px 0; background: #f0f0f0; cursor: pointer; transition: 0.2s; }
    li:hover { background: #ffd6d6; }
  </style>
</head>
<body>

<div id="accessSection">
  <h2>Enter Wi-Fi Access Code</h2>
  <input type="text" id="accessInput" placeholder="Access Code">
  <button id="checkBtn">Enter</button>
</div>

<div id="deviceSection" style="display:none;">
  <h2>Device List</h2>
  <ul id="deviceList"></ul>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, get, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyAIlkvwyaF6FPPbXBJDqHwuTS5S3QKG3l8",
  authDomain: "xoxo-store.firebaseapp.com",
  databaseURL: "https://xoxo-store-default-rtdb.firebaseio.com",
  projectId: "xoxo-store",
  storageBucket: "xoxo-store.firebasestorage.app",
  messagingSenderId: "667290233046",
  appId: "1:667290233046:web:dbbc9130ff38b0900f8177"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const accessSection = document.getElementById("accessSection");
const deviceSection = document.getElementById("deviceSection");
const accessInput = document.getElementById("accessInput");
const checkBtn = document.getElementById("checkBtn");
const deviceList = document.getElementById("deviceList");

// Access code verification
checkBtn.addEventListener("click", async () => {
  const enteredCode = accessInput.value.trim();
  if (!enteredCode) {
    alert("Please enter the access code.");
    return;
  }

  try {
    const snapshot = await get(ref(db, "code/wifi-user"));
    if (snapshot.exists()) {
      const storedCode = snapshot.val(); // numeric 1990
      if (String(storedCode) === enteredCode) {
        alert("✅ Access granted!");
        accessSection.style.display = "none";
        deviceSection.style.display = "block";
        loadDevices();
      } else {
        alert("❌ Access denied!");
      }
    } else {
      alert("❌ No access code found!");
    }
  } catch (error) {
    alert("Error checking code: " + error.message);
  }
});

// Load devices and add click-to-delete functionality
function loadDevices() {
  const devicesRef = ref(db, "devices");
  onValue(devicesRef, snapshot => {
    deviceList.innerHTML = ""; // clear previous list
    snapshot.forEach(child => {
      const key = child.key;
      const li = document.createElement("li");
      li.textContent = key;

      // Click to delete with confirmation
      li.addEventListener("click", async () => {
        const confirmDelete = confirm(`Are you sure you want to delete "${key}"?`);
        if (confirmDelete) {
          try {
            await remove(ref(db, "devices/" + key));
            alert(`✅ "${key}" deleted successfully!`);
          } catch (err) {
            alert("Error deleting device: " + err.message);
          }
        }
      });

      deviceList.appendChild(li);
    });
  });
}
</script>

</body>
</html>
