<!DOCTYPE html>
<html>
<head>
  <title>wifi-code-clients</title>
  <style>
    body {
      font-family: Arial, sans-serif;
    }
    ul {
      padding: 0;
    }
    li {
      list-style: none;
      padding: 10px;
      margin: 6px 0;
      background: #f0f0f0;
      cursor: pointer;
      transition: 0.2s;
    }
    li:hover {
      background: #ffd6d6;
    }
  </style>
</head>
<body>

<h2>CODE ACCES WIFI</h2>
<h4><ul id="deviceList"></ul></h4>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "xoxo-store.firebaseapp.com",
    databaseURL: "https://xoxo-store-default-rtdb.firebaseio.com",
    projectId: "xoxo-store",
    storageBucket: "xoxo-store.firebasestorage.app",
    messagingSenderId: "667290233046",
    appId: "1:667290233046:web:dbbc9130ff38b0900f8177"
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);
  const devicesRef = ref(db, "devices");

  onValue(devicesRef, (snapshot) => {
    const list = document.getElementById("deviceList");
    list.innerHTML = "";

    snapshot.forEach((childSnapshot) => {
      const key = childSnapshot.key;

      const li = document.createElement("li");
      li.textContent = key;

      // 🔥 Click to delete
      li.addEventListener("click", () => {
        const confirmDelete = confirm(`Delete ${key}?`);
        
        if (confirmDelete) {
          remove(ref(db, "devices/" + key))
            .then(() => {
              alert("Deleted successfully");
            })
            .catch((error) => {
              alert("Error: " + error.message);
            });
        }
      });

      list.appendChild(li);
    });
  });

</script>

</body>
</html>
