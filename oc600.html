<!DOCTYPE html>
<html>
<head>
  <title>RTDB Delete Example</title>
</head>
<body>

<h2>Devices List (Click to Delete)</h2>
<ul id="deviceList"></ul>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  // 🔹 Your Firebase config
  const firebaseConfig = {
    apiKey: "YOUR_API_KEY",
    authDomain: "YOUR_PROJECT.firebaseapp.com",
    databaseURL: "https://YOUR_PROJECT-default-rtdb.firebaseio.com",
    projectId: "YOUR_PROJECT_ID",
  };

  const app = initializeApp(firebaseConfig);
  const db = getDatabase(app);

  const devicesRef = ref(db, "devices");

  // 🔹 Load and display list
  onValue(devicesRef, (snapshot) => {
    const list = document.getElementById("deviceList");
    list.innerHTML = "";

    snapshot.forEach((childSnapshot) => {
      const key = childSnapshot.key;
      const data = childSnapshot.val();

      const li = document.createElement("li");
      li.textContent = key + " → " + data.name;

      // 🔥 Click event
      li.onclick = () => {
        const confirmDelete = confirm(`Delete ${data.name}?`);
        if (confirmDelete) {
          const itemRef = ref(db, "devices/" + key);
          remove(itemRef)
            .then(() => {
              alert("Deleted successfully");
            })
            .catch((error) => {
              alert("Error: " + error);
            });
        }
      };

      list.appendChild(li);
    });
  });

</script>

</body>
</html>
